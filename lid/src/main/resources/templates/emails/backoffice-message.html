<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
</head>

<body style="margin:0;padding:0;background-color:#eef7f1;font-family:Arial,Helvetica,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;background:#eef7f1;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:10px;border:1px solid #e3e8e5;overflow:hidden;">

          <!-- HEADER AVEC LOGO -->
          <tr>
            <td style="padding:22px 28px;border-bottom:1px solid #e6ece9;">
              <table width="100%">
                <tr>

                  <!-- Logo -->
                  <td align="left">
                    <table cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="vertical-align:middle;">
                          <img src="https://lid-shop.web.app/imgs/favicon.ico" 
                               alt="LID" 
                               style="display:block;height:32px;">
                        </td>
                        
                      </tr>
                    </table>
                  </td>

                  <!-- Label -->
                  <td align="right">
                    <span style="font-size:12px;color:#888;">
                      Notification
                    </span>
                  </td>

                </tr>
              </table>
            </td>
          </tr>

          <!-- TITLE -->
          <tr>
            <td style="padding:30px 28px 10px;">
              <h2 style="margin:0;font-size:22px;color:#1b5e20;">
                {{subject}}
              </h2>
            </td>
          </tr>

          <!-- Accent -->
          <tr>
            <td style="padding:0 28px 24px;">
              <div style="width:45px;height:3px;background:#43a047;border-radius:2px;"></div>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:0 28px 30px;">
              <div style="color:#444;font-size:15px;line-height:1.8;white-space:pre-line;">
                {{body}}
              </div>
            </td>
          </tr>

          <!-- OPTIONAL INFO BOX -->
          <tr>
            <td style="padding:0 28px 30px;">
              <div style="background:#f4fbf6;border:1px solid #e3efe6;border-radius:6px;padding:12px;">
                <span style="font-size:13px;color:#2e7d32;">
                  Ceci est une communication automatique de LID.
                </span>
              </div>
            </td>
          </tr>

          <!-- DIVIDER -->
          <tr>
            <td style="padding:0 28px;">
              <hr style="border:none;border-top:1px solid #eaeaea;margin:0;">
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:20px 28px;background:#fafdfb;text-align:center;">

              <p style="color:#999;font-size:12px;margin:0 0 6px;">
                © 2025 LID – Life Distribution
              </p>

              <p style="color:#bbb;font-size:11px;margin:0;">
                Cet email a été envoyé automatiquement, merci de ne pas y répondre.
              </p>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
