<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau message de contact</title>
</head>

<body style="margin:0;padding:0;background-color:#eef7f1;font-family:Arial,Helvetica,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;background:#eef7f1;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;width:100%;background:#ffffff;border-radius:10px;border:1px solid #e3e8e5;overflow:hidden;">

          <!-- HEADER AVEC LOGO -->
          <tr>
            <td style="padding:20px 28px;border-bottom:1px solid #e6ece9;">
              <table width="100%">
                <tr>

                  <!-- Logo -->
                  <td align="left">
                    <table cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="vertical-align:middle;">
                          <img src="https://lid-shop.web.app/imgs/favicon.ico" 
                               alt="LID" 
                               style="display:block;height:32px;">
                        </td>
                        
                      </tr>
                    </table>
                  </td>

                  <!-- Label -->
                  <td align="right">
                    <span style="font-size:12px;color:#888;">
                      Nouveau message
                    </span>
                  </td>

                </tr>
              </table>
            </td>
          </tr>

          <!-- TITLE -->
          <tr>
            <td style="padding:28px 28px 10px;">
              <h2 style="margin:0;color:#1b5e20;font-size:20px;">
                {{subject}}
              </h2>
            </td>
          </tr>

          <!-- Accent -->
          <tr>
            <td style="padding:0 28px 20px;">
              <div style="width:40px;height:3px;background:#43a047;border-radius:2px;"></div>
            </td>
          </tr>

          <!-- CONTACT CARD -->
          <tr>
            <td style="padding:0 28px 24px;">

              <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e3efe6;border-radius:8px;overflow:hidden;">

                <tr>
                  <td style="padding:12px;background:#f4fbf6;border-bottom:1px solid #e3efe6;">
                    <span style="color:#2e7d32;font-size:12px;">Nom</span><br>
                    <strong style="color:#1b5e20;font-size:14px;">{{lastName}}</strong>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px;background:#f4fbf6;border-bottom:1px solid #e3efe6;">
                    <span style="color:#2e7d32;font-size:12px;">Prénom</span><br>
                    <span style="color:#333;font-size:14px;">{{firstName}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px;background:#f4fbf6;border-bottom:1px solid #e3efe6;">
                    <span style="color:#2e7d32;font-size:12px;">Email</span><br>
                    <span style="color:#333;font-size:14px;">{{email}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px;background:#f4fbf6;">
                    <span style="color:#2e7d32;font-size:12px;">Téléphone</span><br>
                    <span style="color:#333;font-size:14px;">{{phone}}</span>
                  </td>
                </tr>

              </table>

            </td>
          </tr>

          <!-- MESSAGE -->
          <tr>
            <td style="padding:0 28px 30px;">
              <span style="font-size:12px;color:#2e7d32;font-weight:bold;letter-spacing:1px;">
                MESSAGE
              </span>

              <div style="margin-top:10px;background:#f8fdf9;border:1px solid #e3efe6;border-left:4px solid #43a047;border-radius:6px;padding:16px;">
                <p style="margin:0;color:#333;font-size:14px;line-height:1.7;">
                  {{message}}
                </p>
              </div>
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding:0 28px 30px;">
              <a href="mailto:{{email}}"
                 style="display:inline-block;background:#2e7d32;color:#fff;text-decoration:none;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:bold;">
                Répondre au contact
              </a>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:18px 28px;background:#fafdfb;border-top:1px solid #e6ece9;text-align:center;">
              <span style="color:#999;font-size:11px;">
                LID — Notification automatique — Formulaire de contact
              </span>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
