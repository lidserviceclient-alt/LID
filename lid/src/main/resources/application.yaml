      backoffice-loyalty-tiers-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_LOYALTY_TIERS_TTL_MINUTES:5}
      backoffice-loyalty-top-customers-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_LOYALTY_TOP_CUSTOMERS_TTL_MINUTES:2}
      backoffice-overview-dashboard-max-size: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_DASHBOARD_MAX_SIZE:200}
      backoffice-overview-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_COLLECTION_MAX_SIZE:200}
      backoffice-analytics-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_ANALYTICS_COLLECTION_MAX_SIZE:200}
      backoffice-finance-overview-max-size: ${CATALOG_CACHE_BACKOFFICE_FINANCE_OVERVIEW_MAX_SIZE:200}
      backoffice-finance-transactions-max-size: ${CATALOG_CACHE_BACKOFFICE_FINANCE_TRANSACTIONS_MAX_SIZE:500}
      backoffice-marketing-overview-max-size: ${CATALOG_CACHE_BACKOFFICE_MARKETING_OVERVIEW_MAX_SIZE:200}
      backoffice-newsletter-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_NEWSLETTER_COLLECTION_MAX_SIZE:500}
      backoffice-products-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_PRODUCTS_COLLECTION_MAX_SIZE:500}
      backoffice-inventory-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_INVENTORY_COLLECTION_MAX_SIZE:500}
      backoffice-customers-collection-max-size: ${CATALOG_CACHE_BACKOFFICE_CUSTOMERS_COLLECTION_MAX_SIZE:500}
      backoffice-loyalty-overview-max-size: ${CATALOG_CACHE_BACKOFFICE_LOYALTY_OVERVIEW_MAX_SIZE:200}
      backoffice-loyalty-tiers-max-size: ${CATALOG_CACHE_BACKOFFICE_LOYALTY_TIERS_MAX_SIZE:200}
      backoffice-loyalty-top-customers-max-size: ${CATALOG_CACHE_BACKOFFICE_LOYALTY_TOP_CUSTOMERS_MAX_SIZE:500}
  logs:
    admin:
      file-path: ${LOG_ADMIN_FILE_PATH:${logging.file.name:logs/lid.log}}
      max-read-bytes: ${LOG_ADMIN_MAX_READ_BYTES:2097152}
      include-archives-read: ${LOG_ADMIN_INCLUDE_ARCHIVES_READ:false}
      max-raw-chars: ${LOG_ADMIN_MAX_RAW_CHARS:20000}
  alerts:
    internal-error:
      enabled: ${INTERNAL_ERROR_ALERT_ENABLED:true}
      dedup-minutes: ${INTERNAL_ERROR_ALERT_DEDUP_MINUTES:10}
      fallback-recipients: ${INTERNAL_ERROR_ALERT_FALLBACK_RECIPIENTS:}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age: ${CORS_MAX_AGE:3600}
  mail:
    from: ${SMTP_FROM}
  backoffice:
    messages:
      default-recipients: ${BACKOFFICE_MESSAGES_DEFAULT_RECIPIENTS}
      retry-delay-ms: ${BACKOFFICE_MESSAGES_RETRY_DELAY_MS:60000}
  notifications:
    retention:
      notifications-purge-delay-ms: ${BACKOFFICE_NOTIFICATIONS_PURGE_DELAY_MS:300000}
      notifications-batch-size: ${BACKOFFICE_NOTIFICATIONS_BATCH_SIZE:500}
      notifications-max-batches-per-run: ${BACKOFFICE_NOTIFICATIONS_MAX_BATCHES_PER_RUN:10}
      security-activity-purge-delay-ms: ${BACKOFFICE_SECURITY_ACTIVITY_PURGE_DELAY_MS:21600000}
      security-activity-batch-size: ${BACKOFFICE_SECURITY_ACTIVITY_BATCH_SIZE:500}
      security-activity-max-age-days: ${BACKOFFICE_SECURITY_ACTIVITY_MAX_AGE_DAYS:30}
      security-activity-max-batches-per-run: ${BACKOFFICE_SECURITY_ACTIVITY_MAX_BATCHES_PER_RUN:10}
  marketing:
    dispatch:
      delay-ms: ${MARKETING_DISPATCH_DELAY_MS:30000}
      max-campaigns-per-run: ${MARKETING_DISPATCH_MAX_CAMPAIGNS_PER_RUN:5}
      batch-size: ${MARKETING_DISPATCH_BATCH_SIZE:50}
  security:
    app:
      secret: ${APP_JWT_SECRET_KEY:local_dev_secret_key_please_change_32chars}
      issuer: ${APP_ISSUER:lid-api}
      access-ttl-minutes: ${APP_ACCESS_TTL_MINUTES:15}
      refresh-ttl-days: ${APP_REFRESH_TTL_DAYS:30}

    google:
      issuer-uri: ${GOOGLE_ISSUER_URI:https://accounts.google.com}
      jwk-set-uri: ${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
      client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}

# Configuration PayDunya
paydunya:
  # Mode test ou production
  mode: ${PAYDUNYA_MODE:test}
  
  # Clés API (À remplacer par vos vraies clés de paydunya.com)
  masterKey: ${PAYDUNYA_MASTER_KEY}
  privateKey: ${PAYDUNYA_PRIVATE_KEY}
  publicKey: ${PAYDUNYA_PUBLIC_KEY}
  token: ${PAYDUNYA_TOKEN}
  
  # Configuration du magasin
  storeName: ${PAYDUNYA_STORE_NAME:LID E-commerce}
  storeTagline: ${PAYDUNYA_STORE_TAGLINE:Plateforme de vente en ligne}
  storePhoneNumber: ${PAYDUNYA_STORE_PHONE_NUMBER:+225XXXXXXXXXX}
  storePostalAddress: ${PAYDUNYA_STORE_POSTAL_ADDRESS:Abidjan, Côte d'Ivoire}
  storeWebsiteUrl: ${PAYDUNYA_STORE_WEBSITE_URL:https://lid-ecommerce.com}
  storeLogoUrl: ${PAYDUNYA_STORE_LOGO_URL:https://lid-ecommerce.com/logo.png}
  
  # URLs de redirection
  callbackUrl: ${PAYDUNYA_CALLBACK_URL:https://api.lid-ecommerce.com/api/v1/webhooks/paydunya}
  returnUrl: ${PAYDUNYA_RETURN_URL:https://lid-ecommerce.com/payment/success}
  cancelUrl: ${PAYDUNYA_CANCEL_URL:https://lid-ecommerce.com/payment/cancel}
  
  # Pays supportés (codes ISO 2)
  supportedCountries: ${PAYDUNYA_SUPPORTED_COUNTRIES:CI,SN,BJ,BF,CM,CG,GA,GW,ML}

# Endpoints Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    env:
      enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  # Micrometer
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: "lid"
    description : "LID Application"
    version : "1.0.0"

logging:
  file:
    name: ${LOGGING_FILE_NAME:logs/lid.log}
  level:
    root: INFO
    com.lifeevent.lid: INFO
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: ERROR

storage:
  cdn-base-url: ${STORAGE_CDN_BASE_URL:}
  backblaze:
    bucket-id: ${BACKBLAZE_BUCKET_ID:}
    key-id: ${BACKBLAZE_KEY_ID:}
    application-key: ${BACKBLAZE_APPLICATION_KEY:}
    bucket-name: ${BACKBLAZE_BUCKET_NAME:}
    cdn-base-url: ${BACKBLAZE_CDN_BASE_URL:}
    public-base-url: ${BACKBLAZE_PUBLIC_BASE_URL:}
  local:
    base-path: ${LOCAL_STORAGE_BASE_PATH:target/lid-storage}
    cdn-base-url: ${LOCAL_STORAGE_CDN_BASE_URL:}
    public-base-url: ${LOCAL_STORAGE_PUBLIC_BASE_URL:/api/v1/cdn}

# Configuration Swagger/OpenAPI
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false
