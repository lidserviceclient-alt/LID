spring:
  application:
    name: lid
  data:
    redis:
      repositories:
        enabled: false
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create # à changer en prod
    defer-datasource-initialization: true
    properties:
      javax:
        persistence:
          schema-generation:
            database:
              action: create
            scripts:
              action: create
              create-target: ddl.sql
            create-source: metadata
      hibernate:
        format_sql: true
        use_sql_comments: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  sql:
    init:
      mode: always
      data-locations: classpath:data-h2-parity.sql
  profiles:
    default: local
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:false}
server:
  port: 9000


config:
  realtime:
    enabled: ${REALTIME_ENABLED:true}
    redis-enabled: ${REALTIME_REDIS_ENABLED:false}
    redis-channel: ${REALTIME_REDIS_CHANNEL:lid:realtime:v1}
    outbox:
      poll-delay-ms: ${REALTIME_OUTBOX_POLL_DELAY_MS:1000}
      batch-size: ${REALTIME_OUTBOX_BATCH_SIZE:100}
      max-attempts: ${REALTIME_OUTBOX_MAX_ATTEMPTS:20}
    ticket:
      ttl-seconds: ${REALTIME_TICKET_TTL_SECONDS:30}
    heartbeat:
      interval-seconds: ${REALTIME_HEARTBEAT_INTERVAL_SECONDS:25}
    topics:
      backoffice-notifications-enabled: ${REALTIME_TOPIC_BACKOFFICE_NOTIFICATIONS_ENABLED:true}
      backoffice-overview-enabled: ${REALTIME_TOPIC_BACKOFFICE_OVERVIEW_ENABLED:true}
      delivery-shipment-enabled: ${REALTIME_TOPIC_DELIVERY_SHIPMENT_ENABLED:true}
      payment-status-enabled: ${REALTIME_TOPIC_PAYMENT_STATUS_ENABLED:true}
      catalog-enabled: ${REALTIME_TOPIC_CATALOG_ENABLED:true}
  cache:
    catalog:
      collection-ttl-minutes: ${CATALOG_CACHE_COLLECTION_TTL_MINUTES:30}
      categories-ttl-minutes: ${CATALOG_CACHE_CATEGORIES_TTL_MINUTES:1440}
      featured-categories-ttl-minutes: ${CATALOG_CACHE_FEATURED_CATEGORIES_TTL_MINUTES:720}
      featured-products-ttl-minutes: ${CATALOG_CACHE_FEATURED_PRODUCTS_TTL_MINUTES:180}
      bestseller-products-ttl-minutes: ${CATALOG_CACHE_BESTSELLER_PRODUCTS_TTL_MINUTES:180}
      latest-products-ttl-minutes: ${CATALOG_CACHE_LATEST_PRODUCTS_TTL_MINUTES:30}
      product-details-ttl-minutes: ${CATALOG_CACHE_PRODUCT_DETAILS_TTL_MINUTES:240}
      product-reviews-ttl-minutes: ${CATALOG_CACHE_PRODUCT_REVIEWS_TTL_MINUTES:60}
      blog-posts-ttl-minutes: ${CATALOG_CACHE_BLOG_POSTS_TTL_MINUTES:120}
      blog-post-details-ttl-minutes: ${CATALOG_CACHE_BLOG_POST_DETAILS_TTL_MINUTES:240}
      tickets-ttl-minutes: ${CATALOG_CACHE_TICKETS_TTL_MINUTES:120}
      ticket-details-ttl-minutes: ${CATALOG_CACHE_TICKET_DETAILS_TTL_MINUTES:240}
      partner-collection-ttl-minutes: ${CATALOG_CACHE_PARTNER_COLLECTION_TTL_MINUTES:30}
      partner-settings-ttl-minutes: ${CATALOG_CACHE_PARTNER_SETTINGS_TTL_MINUTES:240}
      partner-products-page-ttl-minutes: ${CATALOG_CACHE_PARTNER_PRODUCTS_PAGE_TTL_MINUTES:30}
      partner-product-details-ttl-minutes: ${CATALOG_CACHE_PARTNER_PRODUCT_DETAILS_TTL_MINUTES:60}
      partner-orders-page-ttl-minutes: ${CATALOG_CACHE_PARTNER_ORDERS_PAGE_TTL_MINUTES:10}
      partner-order-details-ttl-minutes: ${CATALOG_CACHE_PARTNER_ORDER_DETAILS_TTL_MINUTES:10}
      partner-customers-page-ttl-minutes: ${CATALOG_CACHE_PARTNER_CUSTOMERS_PAGE_TTL_MINUTES:30}
      partner-categories-ttl-minutes: ${CATALOG_CACHE_PARTNER_CATEGORIES_TTL_MINUTES:240}
      partner-preferences-ttl-minutes: ${CATALOG_CACHE_PARTNER_PREFERENCES_TTL_MINUTES:240}
      collection-max-size: ${CATALOG_CACHE_COLLECTION_MAX_SIZE:1000}
      categories-max-size: ${CATALOG_CACHE_CATEGORIES_MAX_SIZE:500}
      featured-categories-max-size: ${CATALOG_CACHE_FEATURED_CATEGORIES_MAX_SIZE:500}
      featured-products-max-size: ${CATALOG_CACHE_FEATURED_PRODUCTS_MAX_SIZE:1000}
      bestseller-products-max-size: ${CATALOG_CACHE_BESTSELLER_PRODUCTS_MAX_SIZE:1000}
      latest-products-max-size: ${CATALOG_CACHE_LATEST_PRODUCTS_MAX_SIZE:1000}
      product-details-max-size: ${CATALOG_CACHE_PRODUCT_DETAILS_MAX_SIZE:10000}
      product-reviews-max-size: ${CATALOG_CACHE_PRODUCT_REVIEWS_MAX_SIZE:10000}
      blog-posts-max-size: ${CATALOG_CACHE_BLOG_POSTS_MAX_SIZE:1000}
      blog-post-details-max-size: ${CATALOG_CACHE_BLOG_POST_DETAILS_MAX_SIZE:2000}
      tickets-max-size: ${CATALOG_CACHE_TICKETS_MAX_SIZE:1000}
      ticket-details-max-size: ${CATALOG_CACHE_TICKET_DETAILS_MAX_SIZE:2000}
      partner-collection-max-size: ${CATALOG_CACHE_PARTNER_COLLECTION_MAX_SIZE:1000}
      partner-settings-max-size: ${CATALOG_CACHE_PARTNER_SETTINGS_MAX_SIZE:1000}
      partner-products-page-max-size: ${CATALOG_CACHE_PARTNER_PRODUCTS_PAGE_MAX_SIZE:2000}
      partner-product-details-max-size: ${CATALOG_CACHE_PARTNER_PRODUCT_DETAILS_MAX_SIZE:5000}
      partner-orders-page-max-size: ${CATALOG_CACHE_PARTNER_ORDERS_PAGE_MAX_SIZE:2000}
      partner-order-details-max-size: ${CATALOG_CACHE_PARTNER_ORDER_DETAILS_MAX_SIZE:5000}
      partner-customers-page-max-size: ${CATALOG_CACHE_PARTNER_CUSTOMERS_PAGE_MAX_SIZE:2000}
      partner-categories-max-size: ${CATALOG_CACHE_PARTNER_CATEGORIES_MAX_SIZE:2000}
      partner-preferences-max-size: ${CATALOG_CACHE_PARTNER_PREFERENCES_MAX_SIZE:1000}
      backoffice-overview-dashboard-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_DASHBOARD_TTL_MINUTES:1}
      backoffice-overview-collection-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_COLLECTION_TTL_MINUTES:1}
      backoffice-analytics-collection-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_ANALYTICS_COLLECTION_TTL_MINUTES:1}
      backoffice-finance-overview-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_FINANCE_OVERVIEW_TTL_MINUTES:1}
      backoffice-finance-transactions-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_FINANCE_TRANSACTIONS_TTL_MINUTES:1}
      backoffice-marketing-overview-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_MARKETING_OVERVIEW_TTL_MINUTES:2}
      backoffice-newsletter-collection-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_NEWSLETTER_COLLECTION_TTL_MINUTES:1}
      backoffice-products-collection-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_PRODUCTS_COLLECTION_TTL_MINUTES:1}
      backoffice-inventory-collection-ttl-minutes: ${CATALOG_CACHE_BACKOFFICE_INVENTORY_COLLECTION_TTL_MINUTES:1}
