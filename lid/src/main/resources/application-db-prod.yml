spring:
  config:
    activate:
      on-profile: db-prod
  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: ${REDIS_TIMEOUT:2s}
  cache:
    type: redis

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/lid_db
    username: lid_user
    password: lid_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    properties:
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none
            scripts:
              action: none
      javax:
        persistence:
          schema-generation:
            database:
              action: none
            scripts:
              action: none
      hibernate:
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-db-prod.sql

  h2:
    console:
      enabled: false

  devtools:
    restart:
      enabled: false

  mail:
    host: ${SPRING_MAIL_HOST:${SMTP_HOST}}
    port: ${SPRING_MAIL_PORT:${SMTP_PORT}}
    username: ${SPRING_MAIL_USERNAME:${SMTP_USERNAME}}
    password: ${SPRING_MAIL_PASSWORD:${SMTP_PASSWORD}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:${SMTP_AUTH:true}}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:${SMTP_STARTTLS_ENABLE:true}}
            required: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:${SMTP_STARTTLS_REQUIRED:false}}

config:
  mail:
    from: ${CONFIG_MAIL_FROM:${SMTP_FROM}}
  backoffice:
    messages:
      default-recipients: admin@lid.local
      retry-delay-ms: 60000
  marketing:
    dispatch:
      delay-ms: 30000
      max-campaigns-per-run: 5
      batch-size: 50
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
