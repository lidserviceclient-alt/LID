    <!-- MAIN APP CONTAINER -->
    <div id="root">
      <style>
        .loader-container {
          position: fixed;
          inset: 0;
          background-color: #ffffff;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .cart-box {
          position: relative;
          width: 80px;
          height: 80px;
          animation: bump 0.5s ease-in-out infinite alternate;
        }
        .cart-icon {
          width: 100%;
          height: 100%;
          color: #171717;
        }
        .wheel-front, .wheel-back {
          transform-origin: center;
          animation: spin 0.8s linear infinite;
        }
        /* Wheels specific origins need careful handling in SVG, usually defined by cx/cy. 
           CSS transform-origin on SVG circles works if box is correct. 
        */
        .wheel-front { transform-origin: 20px 21px; }
        .wheel-back { transform-origin: 9px 21px; }
        
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes bump {
          from { transform: translateY(0); }
          to { transform: translateY(-3px); }
        }
        .track-line {
          width: 120px;
          height: 2px;
          background: #e5e5e5;
          margin-top: 10px;
          border-radius: 4px;
          position: relative;
          overflow: hidden;
        }
        .track-line::after {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          height: 100%;
          width: 30%;
          background: #171717;
          border-radius: 4px;
          animation: dash 1s ease-in-out infinite;
        }
        @keyframes dash {
          0% { left: -30%; }
          50% { left: 100%; }
          100% { left: 100%; }
        }
      </style>
      <div class="loader-container">
        <div class="cart-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
            <circle cx="9" cy="21" r="1" style="transform-origin: 9px 21px; animation: spin 0.6s linear infinite;" />
            <circle cx="20" cy="21" r="1" style="transform-origin: 20px 21px; animation: spin 0.6s linear infinite;" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
        </div>
        <div class="track-line"></div>
      </div>
    </div>
