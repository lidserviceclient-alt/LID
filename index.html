    <!-- STRUCTURED DATA (JSON-LD) - WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Lid App",
        "alternateName": "Life Distribution",
        "url": "https://life-distribution.web.app",
        "applicationCategory": "ECommerceApplication",
        "operatingSystem": "Web, iOS, Android",
        "description": "Marketplace e-commerce innovante permettant l'achat et la vente de produits en ligne avec paiements sécurisés et interface moderne.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "XOF"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.7",

            "url": "https://life-distribution.web.app/imgs/logo.png",
            "width": "600",
            "height": "60"
          }
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.lid-app.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        },

          "Interface intuitive",
          "Gestion de boutique",
          "Support multilingue",
          "Mobile Money intégré"
        ]
      }
    </script>

    <!-- STRUCTURED DATA (JSON-LD) - FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Comment fonctionne Lid App ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Lid est une marketplace e-commerce qui permet aux utilisateurs d'acheter et de vendre des produits en ligne facilement. Créez votre compte, parcourez des milliers de produits ou ouvrez votre boutique en quelques clics."
            }
          },
          {
            "@type": "Question",
            "name": "Les paiements sont-ils sécurisés ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui, tous les paiements sur Lid sont 100% sécurisés. Nous utilisons des protocoles de sécurité avancés et supportons Mobile Money, cartes bancaires et autres méthodes de paiement fiables."
            }
          },
          {
            "@type": "Question",
            "name": "Comment vendre sur Lid App ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Pour vendre sur Lid, inscrivez-vous gratuitement, créez votre boutique, ajoutez vos produits avec photos et descriptions, puis commencez à recevoir des commandes. Notre interface intuitive facilite la gestion de votre activité."
            }
          }
        ]
      }
    </script>

    <!-- MAIN APP CONTAINER -->
    <div id="root">
      <style>
        .loader-container {
          position: fixed;
          inset: 0;
          background: radial-gradient(circle at center, #84cc00 0%, #6aa200 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Segoe UI', system-ui, sans-serif;
          overflow: hidden;
        }
        .logo-only {
          width: 160px;
          height: 160px;
          object-fit: contain;
          animation: logo-motion 2.4s ease-in-out infinite;
          filter: drop-shadow(0 14px 24px rgba(0,0,0,0.25));
        }
        @keyframes logo-motion {
          0% { transform: translateY(0) scale(1) rotateY(0deg); filter: drop-shadow(0 14px 24px rgba(0,0,0,0.25)); opacity: 0.95; }
          50% { transform: translateY(-6px) scale(1.06) rotateY(10deg); filter: drop-shadow(0 18px 28px rgba(0,0,0,0.32)); opacity: 1; }
          100% { transform: translateY(0) scale(1) rotateY(0deg); filter: drop-shadow(0 14px 24px rgba(0,0,0,0.25)); opacity: 0.95; }
        }
      </style>
