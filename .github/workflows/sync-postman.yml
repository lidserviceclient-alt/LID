name: Sync Postman from OpenAPI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - collection/openapi.yaml
      - .github/workflows/sync-postman.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAPI_FILE: collection/openapi.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert OpenAPI to Postman collection
        run: |
          npx --yes openapi-to-postmanv2 \
            -s "$OPENAPI_FILE" \
            -o /tmp/postman_collection.json \
            -p

      - name: Wrap payload for Postman API
        run: |
          jq -n \
            --argfile collection /tmp/postman_collection.json \
            '{collection: $collection}' > /tmp/postman_payload.json

      - name: Update Postman collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_UID: ${{ secrets.POSTMAN_COLLECTION_UID }}
        run: |
          test -n "$POSTMAN_API_KEY"
          test -n "$POSTMAN_COLLECTION_UID"

          curl --fail-with-body --silent --show-error \
            --request PUT "https://api.getpostman.com/collections/${POSTMAN_COLLECTION_UID}" \
            --header "X-Api-Key: ${POSTMAN_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @/tmp/postman_payload.json
