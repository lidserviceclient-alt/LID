name: Deploy Backoffice to Firebase Hosting

on:
  push:
    branches:
      - backoffice
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci
        working-directory: backoffice/LID

      - name: Build
        run: npm run build
        working-directory: backoffice/LID

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LID_SHOP }}'
          channelId: live
          projectId: lid-shop
          target: lidback
          entryPoint: backoffice/LID
