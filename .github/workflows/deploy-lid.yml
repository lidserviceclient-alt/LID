name: Deploy LID API

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Image tag format vX.Y.Z"
        required: true
        type: string
      wipe_volumes:
        description: "Run docker compose down -v before redeploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-lid-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LID_IMAGE_REPO: jeanemmanuel01/lid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve and validate release tag
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          if ! echo "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: ${RELEASE_TAG}. Expected: vX.Y.Z"
            exit 1
          fi

          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          RELEASE_IMAGE="${LID_IMAGE_REPO}:${RELEASE_TAG}"
          SHA_IMAGE="${LID_IMAGE_REPO}:${RELEASE_TAG}-${SHORT_SHA}"

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "lid_image_release=${RELEASE_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "lid_image_sha=${SHA_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "deploy_image=${SHA_IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Build phase (skip tests)
        working-directory: lid
        run: mvn -B -DskipTests clean compile

      - name: Generate deployment/ddl.sql with PostgreSQL dialect
        working-directory: lid
        run: |
          set -euo pipefail
          rm -f ../deployment/ddl.sql
          timeout 120s mvn -B -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=ddl-postgres \
            -Dspring-boot.run.arguments="--spring.main.web-application-type=none --spring.main.banner-mode=off" || true
          test -s ../deployment/ddl.sql

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compile and push images (jib build + tags)
        working-directory: lid
        run: >
          mvn -B -DskipTests compile jib:build
          -Djib.to.image="${{ env.LID_IMAGE_REPO }}"
          -Djib.to.tags="${{ steps.release.outputs.release_tag }},${{ steps.release.outputs.release_tag }}-${{ steps.release.outputs.short_sha }}"

      - name: Build deployment .env from GitHub secret
        env:
          LID_BUSINESS_ENV_FILE: ${{ secrets.LID_BUSINESS_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${LID_BUSINESS_ENV_FILE:-}" ]; then
            echo "Missing GitHub secret: LID_BUSINESS_ENV_FILE"
            exit 1
          fi
          printf '%s\n' "${LID_BUSINESS_ENV_FILE}" > deployment/.env
          echo "LID_API_IMAGE=${{ steps.release.outputs.deploy_image }}" >> deployment/.env
          echo "Configured deployment image: ${{ steps.release.outputs.deploy_image }}"

      - name: Clean remote deployment directory
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            mkdir -p ~/apps/lid
            find ~/apps/lid -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload deployment files (deployment/* -> ~/apps/lid/)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "deployment/docker-compose.yml,deployment/.env,deployment/ddl.sql,deployment/scripts/*"
          target: "~/apps/lid"
          strip_components: 1
          overwrite: true

      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            cd ~/apps/lid
            chmod +x ./scripts/*.sh

            WIPE_VOLUMES="${{ inputs.wipe_volumes || 'false' }}"
            if [ "${WIPE_VOLUMES}" = "true" ]; then
              docker compose down -v --remove-orphans
            else
              docker compose down --remove-orphans
            fi

            echo "Deploying image: ${{ steps.release.outputs.deploy_image }}"
            docker image rm "${{ steps.release.outputs.deploy_image }}" || true
            docker compose pull lid-api
            REPLICAS="${LID_API_REPLICAS:-2}"
            docker compose up -d --pull always --force-recreate --scale "lid-api=${REPLICAS}" lid-api

            API_CONTAINER_IDS="$(docker compose ps -q lid-api)"
            if [ -z "${API_CONTAINER_IDS}" ]; then
              echo "No lid-api containers found after deployment"
              docker compose ps
              exit 1
            fi

            for cid in ${API_CONTAINER_IDS}; do
              docker inspect "${cid}" --format 'Container {{.Name}} -> image: {{.Config.Image}}'
              docker inspect "${cid}" --format 'Container {{.Name}} -> image id: {{.Image}}'
            done

            docker compose ps
