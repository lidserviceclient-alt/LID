name: Deploy LID API

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Image tag format vX.Y.Z"
        required: true
        type: string
      wipe_volumes:
        description: "Run docker compose down -v before redeploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-lid-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LID_IMAGE_REPO: jeanemmanuel01/lid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve and validate release tag
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          if ! echo "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: ${RELEASE_TAG}. Expected: vX.Y.Z"
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "lid_image=${LID_IMAGE_REPO}:${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build phase (skip tests)
        working-directory: lid
        run: mvn -B -DskipTests clean package

      - name: Generate deployment/ddl.sql with PostgreSQL dialect
        working-directory: lid
        run: |
          set -euo pipefail
          rm -f ../deployment/ddl.sql
          timeout 120s mvn -B -DskipTests spring-boot:run \
            -Dspring-boot.run.profiles=ddl-postgres \
            -Dspring-boot.run.arguments="--spring.main.web-application-type=none --spring.main.banner-mode=off" || true
          test -s ../deployment/ddl.sql

      - name: Compile phase (jib dockerBuild)
        working-directory: lid
        run: mvn -B -DskipTests jib:dockerBuild -Djib.to.image="${{ steps.release.outputs.lid_image }}"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push images
        run: |
          set -euo pipefail
          docker push "${{ steps.release.outputs.lid_image }}"

      - name: Build deployment .env from GitHub secret
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.LID_BUSINESS_ENV_FILE }}" > deployment/.env

      - name: Clean remote deployment directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p ~/apps/lid
            find ~/apps/lid -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload deployment files (deployment/* -> ~/apps/lid/)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "deployment/*,deployment/.env"
          target: "~/apps/lid"
          strip_components: 1
          overwrite: true

      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/apps/lid

            WIPE_VOLUMES="${{ inputs.wipe_volumes || 'false' }}"
            if [ "${WIPE_VOLUMES}" = "true" ]; then
              docker compose down -v --remove-orphans
            else
              docker compose down --remove-orphans
            fi

            LID_API_IMAGE="${{ steps.release.outputs.lid_image }}" docker compose up -d --pull always --force-recreate lid-api
            docker compose ps
