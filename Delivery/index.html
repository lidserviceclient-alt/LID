<!doctype html>
<html lang="fr">
  <head>
    <!-- Base -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Title & SEO -->
    <title>LID Delivery | Livraison rapide & fiable</title>
    <meta name="description" content="LID Delivery vous offre un service de livraison rapide, sécurisé et fiable. Commandez vos produits en quelques clics et recevez-les directement chez vous." />
    <meta name="keywords" content="LID Delivery, livraison, livraison rapide, commande en ligne, transport, livraison locale" />
    <meta name="author" content="LID Delivery" />

    <!-- Theme -->
    <meta name="theme-color" content="#6aa200" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:title" content="LID Delivery" />
    <meta property="og:description" content="Service de livraison rapide et sécurisé. Commandez en ligne et recevez chez vous." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://liddelivery.web.app" />
    <meta property="og:image" content="https://liddelivery.web.app/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LID Delivery" />
    <meta name="twitter:description" content="Livraison rapide et fiable à portée de clic." />
    <meta name="twitter:image" content="https://liddelivery.web.app/logo.png" />

    <!-- Preconnect (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <noscript>
      Vous devez activer JavaScript pour utiliser LID Delivery.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
