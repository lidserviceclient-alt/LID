version: "3.9"

services:

  # ==============================
  # PostgreSQL
  # ==============================
  lid-db:
    image: postgres:15-alpine
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - lid-db-data:/var/lib/postgresql/data
      - ./ddl.sql:/docker-entrypoint-initdb.d/10-ddl.sql:ro
      - ./scripts:/opt/lid/scripts:ro

    networks:
      - lid

  # ==============================
  # Redis
  # ==============================
  lid-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    volumes:
      - lid-redis-data:/data

    networks:
      - lid

  # ==============================
  # API (scalable)
  # ==============================
  lid-api:
    image: ${LID_API_IMAGE}
    restart: unless-stopped

    depends_on:
      lid-db:
        condition: service_healthy
      lid-redis:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: prod

      # ===== DATABASE =====
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://lid-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"

      # ===== HIKARI =====
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAXIMUM_POOL_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MINIMUM_IDLE}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${HIKARI_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${HIKARI_MAX_LIFETIME}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${HIKARI_CONNECTION_TIMEOUT}

      # ===== REDIS =====
      SPRING_DATA_REDIS_HOST: lid-redis
      SPRING_DATA_REDIS_PORT: 6379

      # ===== TOMCAT =====
      SERVER_TOMCAT_THREADS_MAX: 120
      SERVER_TOMCAT_ACCEPT_COUNT: 100

      SERVER_SERVLET_CONTEXT_PATH: /lid
      SERVER_FORWARD_HEADERS_STRATEGY: framework

    networks:
      - lid
      - web

    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.lid.rule=Host(`jean-emmanuel-diap.com`) && PathPrefix(`/lid`)
      - traefik.http.routers.lid.entrypoints=websecure
      - traefik.http.routers.lid.tls.certresolver=letsencrypt
      - traefik.http.services.lid.loadbalancer.server.port=9000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==============================
# VOLUMES
# ==============================
volumes:
  lid-db-data:
  lid-redis-data:

# ==============================
# NETWORKS
# ==============================
networks:
  lid:
  web:
    external: true