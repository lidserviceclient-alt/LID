      CATALOG_CACHE_BLOG_POSTS_TTL_MINUTES: ${CATALOG_CACHE_BLOG_POSTS_TTL_MINUTES}
      CATALOG_CACHE_BLOG_POST_DETAILS_TTL_MINUTES: ${CATALOG_CACHE_BLOG_POST_DETAILS_TTL_MINUTES}
      CATALOG_CACHE_TICKETS_TTL_MINUTES: ${CATALOG_CACHE_TICKETS_TTL_MINUTES}
      CATALOG_CACHE_TICKET_DETAILS_TTL_MINUTES: ${CATALOG_CACHE_TICKET_DETAILS_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_COLLECTION_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_COLLECTION_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_SETTINGS_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_SETTINGS_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_PRODUCTS_PAGE_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_PRODUCTS_PAGE_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_PRODUCT_DETAILS_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_PRODUCT_DETAILS_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_ORDERS_PAGE_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_ORDERS_PAGE_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_ORDER_DETAILS_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_ORDER_DETAILS_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_CUSTOMERS_PAGE_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_CUSTOMERS_PAGE_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_CATEGORIES_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_CATEGORIES_TTL_MINUTES}
      CATALOG_CACHE_PARTNER_PREFERENCES_TTL_MINUTES: ${CATALOG_CACHE_PARTNER_PREFERENCES_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_OVERVIEW_DASHBOARD_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_DASHBOARD_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_OVERVIEW_COLLECTION_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_OVERVIEW_COLLECTION_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_ANALYTICS_COLLECTION_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_ANALYTICS_COLLECTION_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_FINANCE_OVERVIEW_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_FINANCE_OVERVIEW_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_FINANCE_TRANSACTIONS_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_FINANCE_TRANSACTIONS_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_MARKETING_OVERVIEW_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_MARKETING_OVERVIEW_TTL_MINUTES}
      CATALOG_CACHE_BACKOFFICE_NEWSLETTER_COLLECTION_TTL_MINUTES: ${CATALOG_CACHE_BACKOFFICE_NEWSLETTER_COLLECTION_TTL_MINUTES}
