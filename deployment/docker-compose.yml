services:

  # ==============================
  # PostgreSQL
  # ==============================
  lid-db:
    image: postgres:15-alpine
    container_name: lid-db
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - lid-db-data:/var/lib/postgresql/data
      - ./ddl.sql:/docker-entrypoint-initdb.d/10-ddl.sql:ro
      - ./scripts:/opt/lid/scripts:ro

    networks:
      - lid

  # ==============================
  # Redis
  # ==============================
  lid-redis:
    image: redis:7.2-alpine
    container_name: lid-redis
    restart: unless-stopped
    command: redis-server --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY}

    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

    volumes:
      - lid-redis-data:/data

    networks:
      - lid

  # ==============================
  # API (scalable)
  # ==============================
  lid-api:
    image: ${LID_API_IMAGE}
    restart: unless-stopped
    volumes:
      - ./storage:${LOCAL_STORAGE_BASE_PATH}

    depends_on:
      lid-db:
        condition: service_healthy
      lid-redis:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: prod

      # ===== DATABASE =====
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://lid-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_JAKARTA_PERSISTENCE_SCHEMA_GENERATION_DATABASE_ACTION: none
      SPRING_JPA_PROPERTIES_JAKARTA_PERSISTENCE_SCHEMA_GENERATION_SCRIPTS_ACTION: none
      SPRING_JPA_PROPERTIES_JAVAX_PERSISTENCE_SCHEMA_GENERATION_DATABASE_ACTION: none
      SPRING_JPA_PROPERTIES_JAVAX_PERSISTENCE_SCHEMA_GENERATION_SCRIPTS_ACTION: none
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_SQL_INIT_MODE: never
      SPRING_SQL_INIT_DATA_LOCATIONS: ""
      SPRING_BATCH_JDBC_INITIALIZE_DATABASE: never

      # ===== HIKARI POOL =====
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAXIMUM_POOL_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MINIMUM_IDLE}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${HIKARI_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${HIKARI_MAX_LIFETIME}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${HIKARI_CONNECTION_TIMEOUT}

      # ===== TOMCAT THREADS =====
      SERVER_TOMCAT_THREADS_MAX: 120
      SERVER_TOMCAT_ACCEPT_COUNT: 100

      # ===== REDIS =====
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_DATA_REDIS_DATABASE: ${SPRING_DATA_REDIS_DATABASE}

      # ===== JWT =====
      APP_JWT_SECRET_KEY: ${APP_JWT_SECRET_KEY}
      APP_ISSUER: ${APP_ISSUER}
      APP_ACCESS_TTL_MINUTES: ${APP_ACCESS_TTL_MINUTES}
      APP_REFRESH_TTL_DAYS: ${APP_REFRESH_TTL_DAYS}

      # ===== Google =====
      GOOGLE_ISSUER_URI: ${GOOGLE_ISSUER_URI}
      GOOGLE_JWK_SET_URI: ${GOOGLE_JWK_SET_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

      # ===== PayDunya =====
      PAYDUNYA_MODE: ${PAYDUNYA_MODE}
      PAYDUNYA_MASTER_KEY: ${PAYDUNYA_MASTER_KEY}
      PAYDUNYA_PRIVATE_KEY: ${PAYDUNYA_PRIVATE_KEY}
      PAYDUNYA_PUBLIC_KEY: ${PAYDUNYA_PUBLIC_KEY}
      PAYDUNYA_TOKEN: ${PAYDUNYA_TOKEN}
      PAYDUNYA_CALLBACK_URL: ${PAYDUNYA_CALLBACK_URL}
      PAYDUNYA_RETURN_URL: ${PAYDUNYA_RETURN_URL}
      PAYDUNYA_CANCEL_URL: ${PAYDUNYA_CANCEL_URL}
      PAYDUNYA_STORE_NAME: ${PAYDUNYA_STORE_NAME}
      PAYDUNYA_STORE_TAGLINE: ${PAYDUNYA_STORE_TAGLINE}
      PAYDUNYA_STORE_PHONE_NUMBER: ${PAYDUNYA_STORE_PHONE_NUMBER}
      PAYDUNYA_STORE_POSTAL_ADDRESS: ${PAYDUNYA_STORE_POSTAL_ADDRESS}
      PAYDUNYA_STORE_WEBSITE_URL: ${PAYDUNYA_STORE_WEBSITE_URL}
      PAYDUNYA_STORE_LOGO_URL: ${PAYDUNYA_STORE_LOGO_URL}
      PAYDUNYA_SUPPORTED_COUNTRIES: ${PAYDUNYA_SUPPORTED_COUNTRIES}

      # ===== MAIL =====
      SPRING_MAIL_HOST: ${SMTP_HOST}
      SPRING_MAIL_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SMTP_AUTH}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: ${SMTP_STARTTLS_REQUIRED}
      

      # ===== CORS =====
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS}
      CORS_MAX_AGE: ${CORS_MAX_AGE}

      # ===== BACKOFFICE =====
      BACKOFFICE_MESSAGES_DEFAULT_RECIPIENTS: ${BACKOFFICE_MESSAGES_DEFAULT_RECIPIENTS}
      BACKOFFICE_MESSAGES_RETRY_DELAY_MS: ${BACKOFFICE_MESSAGES_RETRY_DELAY_MS}

      # ===== MARKETING =====
      MARKETING_DISPATCH_DELAY_MS: ${MARKETING_DISPATCH_DELAY_MS}
      MARKETING_DISPATCH_MAX_CAMPAIGNS_PER_RUN: ${MARKETING_DISPATCH_MAX_CAMPAIGNS_PER_RUN}
      MARKETING_DISPATCH_BATCH_SIZE: ${MARKETING_DISPATCH_BATCH_SIZE}

      # ===== RUNTIME =====
      APP_RESET_CODE_TTL_MINUTES: ${APP_RESET_CODE_TTL_MINUTES}
      SPRING_THREADS_VIRTUAL_ENABLED: ${SPRING_THREADS_VIRTUAL_ENABLED}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}

      # ===== MAIL ALIASES =====
      CONFIG_MAIL_FROM: ${CONFIG_MAIL_FROM}

      # ===== REDIS ALIASES =====
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: ${REDIS_SSL}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT}

      # ===== REALTIME =====
      REALTIME_ENABLED: ${REALTIME_ENABLED}
      REALTIME_REDIS_ENABLED: ${REALTIME_REDIS_ENABLED}
      REALTIME_REDIS_CHANNEL: ${REALTIME_REDIS_CHANNEL}
      REALTIME_OUTBOX_POLL_DELAY_MS: ${REALTIME_OUTBOX_POLL_DELAY_MS}
      REALTIME_OUTBOX_BATCH_SIZE: ${REALTIME_OUTBOX_BATCH_SIZE}
      REALTIME_OUTBOX_MAX_ATTEMPTS: ${REALTIME_OUTBOX_MAX_ATTEMPTS}
      REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS}
      REALTIME_HEARTBEAT_INTERVAL_SECONDS: ${REALTIME_HEARTBEAT_INTERVAL_SECONDS}
      REALTIME_TOPIC_BACKOFFICE_NOTIFICATIONS_ENABLED: ${REALTIME_TOPIC_BACKOFFICE_NOTIFICATIONS_ENABLED}
      REALTIME_TOPIC_BACKOFFICE_OVERVIEW_ENABLED: ${REALTIME_TOPIC_BACKOFFICE_OVERVIEW_ENABLED}
      REALTIME_TOPIC_DELIVERY_SHIPMENT_ENABLED: ${REALTIME_TOPIC_DELIVERY_SHIPMENT_ENABLED}
      REALTIME_TOPIC_PAYMENT_STATUS_ENABLED: ${REALTIME_TOPIC_PAYMENT_STATUS_ENABLED}
      REALTIME_TOPIC_CATALOG_ENABLED: ${REALTIME_TOPIC_CATALOG_ENABLED}

      # ===== LOGS / ALERTS =====
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME}
      LOG_ADMIN_FILE_PATH: ${LOG_ADMIN_FILE_PATH}
      LOG_ADMIN_MAX_READ_BYTES: ${LOG_ADMIN_MAX_READ_BYTES}
      LOG_ADMIN_INCLUDE_ARCHIVES_READ: ${LOG_ADMIN_INCLUDE_ARCHIVES_READ}
      LOG_ADMIN_MAX_RAW_CHARS: ${LOG_ADMIN_MAX_RAW_CHARS}
      INTERNAL_ERROR_ALERT_ENABLED: ${INTERNAL_ERROR_ALERT_ENABLED}
      INTERNAL_ERROR_ALERT_DEDUP_MINUTES: ${INTERNAL_ERROR_ALERT_DEDUP_MINUTES}
      INTERNAL_ERROR_ALERT_FALLBACK_RECIPIENTS: ${INTERNAL_ERROR_ALERT_FALLBACK_RECIPIENTS}

      # ===== NOTIFICATIONS RETENTION =====
      BACKOFFICE_NOTIFICATIONS_PURGE_DELAY_MS: ${BACKOFFICE_NOTIFICATIONS_PURGE_DELAY_MS}
      BACKOFFICE_NOTIFICATIONS_BATCH_SIZE: ${BACKOFFICE_NOTIFICATIONS_BATCH_SIZE}
      BACKOFFICE_NOTIFICATIONS_MAX_BATCHES_PER_RUN: ${BACKOFFICE_NOTIFICATIONS_MAX_BATCHES_PER_RUN}
      BACKOFFICE_SECURITY_ACTIVITY_PURGE_DELAY_MS: ${BACKOFFICE_SECURITY_ACTIVITY_PURGE_DELAY_MS}
      BACKOFFICE_SECURITY_ACTIVITY_BATCH_SIZE: ${BACKOFFICE_SECURITY_ACTIVITY_BATCH_SIZE}
      BACKOFFICE_SECURITY_ACTIVITY_MAX_AGE_DAYS: ${BACKOFFICE_SECURITY_ACTIVITY_MAX_AGE_DAYS}
      BACKOFFICE_SECURITY_ACTIVITY_MAX_BATCHES_PER_RUN: ${BACKOFFICE_SECURITY_ACTIVITY_MAX_BATCHES_PER_RUN}

      # ===== STORAGE / CDN =====
      STORAGE_CDN_BASE_URL: ${STORAGE_CDN_BASE_URL}
      STORAGE_IMAGE_MAX_UPLOAD_BYTES: ${STORAGE_IMAGE_MAX_UPLOAD_BYTES}
      STORAGE_IMAGE_MAX_DIMENSION: ${STORAGE_IMAGE_MAX_DIMENSION}
      STORAGE_IMAGE_JPEG_QUALITY: ${STORAGE_IMAGE_JPEG_QUALITY}
      LOCAL_STORAGE_BASE_PATH: ${LOCAL_STORAGE_BASE_PATH}
      LOCAL_STORAGE_CDN_BASE_URL: ${LOCAL_STORAGE_CDN_BASE_URL}
      LOCAL_STORAGE_PUBLIC_BASE_URL: ${LOCAL_STORAGE_PUBLIC_BASE_URL}
      BACKBLAZE_BUCKET_ID: ${BACKBLAZE_BUCKET_ID}
      BACKBLAZE_KEY_ID: ${BACKBLAZE_KEY_ID}
      BACKBLAZE_APPLICATION_KEY: ${BACKBLAZE_APPLICATION_KEY}
      BACKBLAZE_BUCKET_NAME: ${BACKBLAZE_BUCKET_NAME}
      BACKBLAZE_CDN_BASE_URL: ${BACKBLAZE_CDN_BASE_URL}
      BACKBLAZE_PUBLIC_BASE_URL: ${BACKBLAZE_PUBLIC_BASE_URL}

      # ===== CACHE TTL =====
      CATALOG_CACHE_COLLECTION_TTL_MINUTES: ${CATALOG_CACHE_COLLECTION_TTL_MINUTES}
      CATALOG_CACHE_CATEGORIES_TTL_MINUTES: ${CATALOG_CACHE_CATEGORIES_TTL_MINUTES}
      CATALOG_CACHE_FEATURED_CATEGORIES_TTL_MINUTES: ${CATALOG_CACHE_FEATURED_CATEGORIES_TTL_MINUTES}
